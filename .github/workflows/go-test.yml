name: Go Test Pipeline

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "**.md"
      - ".github/**"

jobs:
  test:
    name: Run go vet & go test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install dependencies
        run: go mod download

      - name: Run Go Vet
        run: go vet -v ./...

      - name: Run Go Tests
        run: go test -v ./...
